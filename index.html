<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfís disponíveis">
            <nav class="profiles">
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil-1.jpg" alt="Uma figura de stop-motion, com a estética de um filme de Tim Burton, segura uma moldura de quadro vazia em um cômodo repleto de outros quadros e portas, em tons de azul e roxo.">
                        <figcaption>Perfil 1</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil-2.jpg" alt="Uma borboleta azul de asas vibrantes pousa sobre uma folha seca contra um fundo de veludo vermelho profundo, com partículas de poeira suspensas no ar.">
                        <figcaption>Perfil 2</figcaption>
                    </figure>
                </a>
            </nav>
        </section>
    </main>
</body>
</html>
