<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfís disponíveis">
            <nav class="profiles">
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil-1.jpg" alt="Uma figura de stop-motion, com a estética de um filme de Tim Burton, segura uma moldura de quadro vazia em um cômodo repleto de outros quadros e portas, em tons de azul e roxo.">
                        <figcaption>Maria</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil-2.jpg" alt="Uma borboleta azul de asas vibrantes pousa sobre uma folha seca contra um fundo de veludo vermelho profundo, com partículas de poeira suspensas no ar.">
                        <figcaption>Lucas</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil-3.jpg" alt="Uma figura segura duas chaves antigas enquanto se apoia em uma coluna desgastada em um cenário gótico e labiríntico, com diversas portas, escadarias e torres, em tons de roxo, azul e amarelo.">
                        <figcaption>Fernando</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="perfil-4.jpg" alt="Uma figura que mostra um corvo segurando uma chave dourada no bico, pousado sobre uma coluna de pedra em meio a um cenário gótico e surreal com portas, escadarias e torres, em tons predominantemente azuis e roxos.">
                        <figcaption>Brenda</figcaption>
                    </figure>
                </a>
            </nav>
        </section>
    </main>
</body>
</html>
